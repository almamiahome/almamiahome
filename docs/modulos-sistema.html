<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alma Mía · Módulos del sistema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: radial-gradient(circle at top, #1f2937 0%, #020617 60%, #020617 100%); }
    .window-shadow { box-shadow: 0 28px 80px rgba(15, 23, 42, .65); }
    .card-glass { backdrop-filter: blur(8px); }
  </style>
</head>
<body class="min-h-screen text-slate-100">
  <main class="mx-auto max-w-7xl px-4 py-8 md:px-8">
    <section class="overflow-hidden rounded-2xl border border-slate-700/60 bg-slate-900/80 window-shadow">
      <header class="flex items-center justify-between border-b border-slate-700/60 bg-slate-800/80 px-4 py-3">
        <div class="flex items-center gap-2">
          <span class="h-3 w-3 rounded-full bg-rose-500"></span>
          <span class="h-3 w-3 rounded-full bg-amber-400"></span>
          <span class="h-3 w-3 rounded-full bg-emerald-500"></span>
        </div>
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-300">Sistema Operativo Alma Mía</p>
        <div class="text-xs text-slate-400"><i class="fa-regular fa-clock mr-1"></i><span id="hora"></span></div>
      </header>

      <div class="border-b border-slate-700/50 bg-slate-900/70 px-4 py-6 md:px-8">
        <h1 id="titulo" class="text-2xl font-bold md:text-3xl"></h1>
        <p id="subtitulo" class="mt-2 max-w-3xl text-sm text-slate-300 md:text-base"></p>
        <p id="nota" class="mt-3 text-xs text-slate-400"></p>
      </div>

      <div class="grid gap-6 bg-slate-950/60 p-4 md:p-8 lg:grid-cols-[1fr_320px]">
        <div class="space-y-7">
          <section>
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-emerald-300">Módulos activos</h2>
              <span id="total-activos" class="rounded-full border border-emerald-500/30 bg-emerald-500/20 px-3 py-1 text-xs font-semibold text-emerald-200"></span>
            </div>
            <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3" id="grid-activos"></div>
          </section>

          <section>
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-amber-300">Módulos / funciones por crear</h2>
              <span id="total-crear" class="rounded-full border border-amber-500/30 bg-amber-500/20 px-3 py-1 text-xs font-semibold text-amber-200"></span>
            </div>
            <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3" id="grid-crear"></div>
          </section>
        </div>

        <aside class="h-fit rounded-xl border border-slate-700/70 bg-slate-900/85 p-4 lg:sticky lg:top-8">
          <h3 class="text-base font-semibold">Pedido de implementación</h3>
          <p class="mt-1 text-xs text-slate-400">Marcá los módulos por crear para calcular total estimado.</p>
          <div class="mt-4 space-y-2 text-sm">
            <p class="flex items-center justify-between"><span>Seleccionados</span><strong id="pedido-cantidad">0</strong></p>
            <p class="flex items-center justify-between"><span>Total estimado</span><strong id="pedido-total" class="text-sky-300">USD 0</strong></p>
          </div>
          <div class="mt-4 max-h-72 space-y-2 overflow-auto pr-1" id="pedido-lista">
            <p class="text-xs text-slate-500">Todavía no seleccionaste módulos.</p>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/80 p-4">
    <div class="w-full max-w-xl rounded-xl border border-slate-700 bg-slate-900 p-6">
      <div class="mb-4 flex items-start justify-between gap-4">
        <h2 id="modal-titulo" class="text-xl font-semibold"></h2>
        <button id="cerrar-modal" class="rounded-md border border-slate-600 px-3 py-1 text-xs hover:bg-slate-800">Cerrar</button>
      </div>
      <p id="modal-descripcion" class="text-sm text-slate-200"></p>
    </div>
  </div>

  <script>
    const estadoConfig = {
      activo: {
        etiqueta: 'Activo',
        clases: 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30'
      },
      'por-crear': {
        etiqueta: 'Por crear',
        clases: 'bg-amber-500/20 text-amber-300 border border-amber-400/30'
      }
    };

    const money = (value, currency) => new Intl.NumberFormat('es-UY', {
      style: 'currency',
      currency,
      maximumFractionDigits: 0
    }).format(value);

    function renderModulo(modulo, moneda) {
      const estado = estadoConfig[modulo.estado] || estadoConfig['por-crear'];
      const precioTexto = modulo.precio === 0 ? 'Incluido' : money(modulo.precio, moneda);
      const checkHtml = modulo.estado === 'por-crear'
        ? `<label class="mt-3 flex cursor-pointer items-center gap-2 rounded-lg border border-slate-700 bg-slate-800/70 px-3 py-2 text-xs hover:border-sky-500/60">
            <input type="checkbox" data-modulo-check="${modulo.id}" class="h-4 w-4 rounded border-slate-500 bg-slate-900 text-sky-400 focus:ring-sky-500" />
            <span>Agregar al pedido</span>
          </label>`
        : '';

      return `
        <article class="card-glass rounded-xl border border-slate-700/70 bg-slate-900/80 p-5">
          <div class="mb-4 flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="rounded-lg border border-slate-700 bg-slate-800 p-2 text-fuchsia-300">
                <i data-lucide="${modulo.icono}" class="h-5 w-5"></i>
              </div>
              <div>
                <h3 class="text-base font-semibold leading-tight">${modulo.nombre}</h3>
                <p class="mt-1 text-xs text-slate-400">ID: ${modulo.id}</p>
              </div>
            </div>
            <span class="rounded-full px-2.5 py-1 text-[11px] font-semibold ${estado.clases}">${estado.etiqueta}</span>
          </div>

          <p class="text-sm text-slate-300">${modulo.descripcion}</p>

          <div class="mt-4 flex items-center justify-between border-t border-slate-700 pt-4">
            <p class="text-sm font-semibold text-slate-100"><i class="fa-solid fa-tag mr-1 text-sky-300"></i>${precioTexto}</p>
            <button data-open-modal="${modulo.id}" class="rounded-lg border border-slate-600 bg-slate-800 px-3 py-1.5 text-xs hover:bg-slate-700">
              Ver detalle
            </button>
          </div>
          ${checkHtml}
        </article>
      `;
    }

    function actualizarPedido(data) {
      const checks = [...document.querySelectorAll('[data-modulo-check]:checked')];
      const seleccionados = checks
        .map((check) => data.modulos.find((modulo) => modulo.id === check.dataset.moduloCheck))
        .filter(Boolean);

      const total = seleccionados.reduce((acc, modulo) => acc + modulo.precio, 0);
      document.getElementById('pedido-cantidad').textContent = seleccionados.length;
      document.getElementById('pedido-total').textContent = money(total, data.meta.moneda);

      const lista = document.getElementById('pedido-lista');
      if (!seleccionados.length) {
        lista.innerHTML = '<p class="text-xs text-slate-500">Todavía no seleccionaste módulos.</p>';
        return;
      }

      lista.innerHTML = seleccionados.map((modulo) => `
        <div class="rounded-lg border border-slate-700 bg-slate-800/80 px-3 py-2 text-xs">
          <p class="font-medium text-slate-100">${modulo.nombre}</p>
          <p class="mt-1 text-slate-300">${money(modulo.precio, data.meta.moneda)}</p>
        </div>
      `).join('');
    }

    async function iniciar() {
      const hora = document.getElementById('hora');
      setInterval(() => {
        hora.textContent = new Date().toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' });
      }, 1000);

      const data = {
        "meta": {
          "titulo": "Mapa de módulos Alma Mía",
          "subtitulo": "17 módulos activos y 20 módulos/funciones por implementar",
          "moneda": "USD",
          "notaPrecios": "Seleccioná los módulos por crear para armar tu pedido y estimar inversión total."
        },
        "modulos": [
          {"id":"autenticacion-wave","nombre":"Autenticación y seguridad Wave","estado":"activo","precio":0,"icono":"shield-check","descripcion":"Login, registro, recuperación y control de accesos.","detalle":"Base de seguridad operativa ya implementada para usuarias internas y administrativas."},
          {"id":"roles-permisos","nombre":"Roles y permisos","estado":"activo","precio":0,"icono":"key-round","descripcion":"Control granular de permisos por rol comercial.","detalle":"Permite administrar permisos y visibilidad de acciones según el rol asignado."},
          {"id":"onboarding-comercial","nombre":"Onboarding comercial","estado":"activo","precio":0,"icono":"user-plus","descripcion":"Alta inicial de vendedoras, líderes y coordinadoras.","detalle":"Normaliza el ingreso de nuevas integrantes con reglas jerárquicas definidas."},
          {"id":"perfil-usuario","nombre":"Perfil y datos de usuario","estado":"activo","precio":0,"icono":"user-circle","descripcion":"Gestión de información personal y comercial.","detalle":"Edición de perfil, contacto y datos de operación para cada usuaria."},
          {"id":"catalogo-productos","nombre":"Catálogo de productos","estado":"activo","precio":0,"icono":"package","descripcion":"ABM de productos, categorías y estados.","detalle":"Estructura base del catálogo para venta y campañas."},
          {"id":"categorias-producto","nombre":"Categorías y líneas","estado":"activo","precio":0,"icono":"layers-3","descripcion":"Organización comercial del catálogo por líneas.","detalle":"Facilita filtros, reportes y reglas por tipo de producto."},
          {"id":"pedidos-base","nombre":"Pedidos base","estado":"activo","precio":0,"icono":"shopping-cart","descripcion":"Registro de pedidos con detalle de ítems.","detalle":"Permite cargar pedidos y asociarlos a estructura comercial."},
          {"id":"totales-monetarios","nombre":"Totales monetarios","estado":"activo","precio":0,"icono":"receipt","descripcion":"Cálculo de subtotal, descuentos y total final.","detalle":"Motor actual para consolidar montos por pedido."},
          {"id":"puntos-base","nombre":"Puntos comerciales base","estado":"activo","precio":0,"icono":"star","descripcion":"Asignación inicial de puntaje por venta.","detalle":"Permite registrar puntos por operación según reglas vigentes."},
          {"id":"campanias-base","nombre":"Campañas comerciales base","estado":"activo","precio":0,"icono":"megaphone","descripcion":"Configuración de periodos y campañas.","detalle":"Define campañas activas y ventanas operativas."},
          {"id":"cobros-base","nombre":"Cobros y pagos base","estado":"activo","precio":0,"icono":"wallet","descripcion":"Registro de cobranzas y pagos internos.","detalle":"Trazabilidad general de movimientos financieros."},
          {"id":"panel-filament","nombre":"Panel administrativo","estado":"activo","precio":0,"icono":"layout-dashboard","descripcion":"Gestión interna de operaciones y datos.","detalle":"Panel central para administración diaria del sistema."},
          {"id":"reportes-basicos","nombre":"Reportes básicos","estado":"activo","precio":0,"icono":"bar-chart-3","descripcion":"Vistas operativas de seguimiento general.","detalle":"Reportes iniciales para control de actividad y ventas."},
          {"id":"notificaciones-base","nombre":"Notificaciones internas","estado":"activo","precio":0,"icono":"bell","descripcion":"Alertas de acciones y eventos del sistema.","detalle":"Mensajes internos para seguimiento operativo."},
          {"id":"auditoria-base","nombre":"Auditoría de cambios","estado":"activo","precio":0,"icono":"file-search","descripcion":"Historial de eventos clave del sistema.","detalle":"Registro de cambios para soporte y trazabilidad."},
          {"id":"importacion-datos","nombre":"Importación de datos","estado":"activo","precio":0,"icono":"database","descripcion":"Carga de datos iniciales por lotes.","detalle":"Permite importar información histórica y operativa."},
          {"id":"exportacion-datos","nombre":"Exportación de datos","estado":"activo","precio":0,"icono":"download","descripcion":"Descarga de reportes y listados.","detalle":"Exportación en formatos operativos para análisis externo."},
      
          {"id":"calendario-cierres-v2","nombre":"Calendario anual y cierres V2","estado":"por-crear","precio":650,"icono":"calendar-days","descripcion":"Cierres correlativos con validaciones automáticas.","detalle":"Control de periodos, bloqueos y continuidad entre cierres."},
          {"id":"saldos-diferidos-v2","nombre":"Saldos diferidos","estado":"por-crear","precio":780,"icono":"scale","descripcion":"Compensaciones y arrastres entre cierres.","detalle":"Gestión de saldos pendientes y aplicación futura."},
          {"id":"premios-revendedoras-v2","nombre":"Premios de revendedoras","estado":"por-crear","precio":540,"icono":"gift","descripcion":"Canje y seguimiento de premios por puntos.","detalle":"Motor de incentivos para revendedoras por desempeño."},
          {"id":"premios-lideres-v2","nombre":"Premios de líderes","estado":"por-crear","precio":920,"icono":"crown","descripcion":"Bonos por crecimiento, actividad y cobranza.","detalle":"Reglas avanzadas de incentivo para liderazgo comercial."},
          {"id":"ranking-zonal","nombre":"Ranking por zona","estado":"por-crear","precio":460,"icono":"map-pinned","descripcion":"Ranking territorial por cierre y campaña.","detalle":"Comparativas de rendimiento por zona y referente."},
          {"id":"liquidaciones-automaticas","nombre":"Liquidaciones automáticas","estado":"por-crear","precio":860,"icono":"cpu","descripcion":"Cálculo masivo de resultados por cierre.","detalle":"Proceso automatizado para liquidaciones reproducibles."},
          {"id":"objetivos-personalizados","nombre":"Objetivos personalizados","estado":"por-crear","precio":490,"icono":"target","descripcion":"Metas dinámicas por rol y nivel.","detalle":"Configuración de objetivos con seguimiento de cumplimiento."},
          {"id":"tramos-comision","nombre":"Tramos de comisión","estado":"por-crear","precio":620,"icono":"percent","descripcion":"Escalas de comisión por rendimiento.","detalle":"Cálculo de comisiones por tramo y periodo."},
          {"id":"estado-pedido-avanzado","nombre":"Estados de pedido avanzados","estado":"por-crear","precio":430,"icono":"list-checks","descripcion":"Flujo completo de estados operativos.","detalle":"Pipeline detallado desde carga hasta entrega y cierre."},
          {"id":"devoluciones-cambios","nombre":"Devoluciones y cambios","estado":"por-crear","precio":550,"icono":"refresh-ccw","descripcion":"Gestión de devoluciones con impacto monetario.","detalle":"Proceso de reversas y ajustes por reclamos o cambios."},
          {"id":"alertas-morosidad","nombre":"Alertas de morosidad","estado":"por-crear","precio":390,"icono":"alert-triangle","descripcion":"Detección temprana de riesgo de cobranza.","detalle":"Alertas automáticas para seguimiento preventivo."},
          {"id":"seguimiento-cartera","nombre":"Seguimiento de cartera","estado":"por-crear","precio":640,"icono":"briefcase-business","descripcion":"Vista consolidada de deuda y recupero.","detalle":"Panel de cartera por vendedora, líder y zona."},
          {"id":"simulador-ganancias","nombre":"Simulador de ganancias","estado":"por-crear","precio":470,"icono":"calculator","descripcion":"Estimador de ganancia por escenario de venta.","detalle":"Proyecciones de ingresos según objetivos y mix."},
          {"id":"tablero-ejecutivo","nombre":"Tablero ejecutivo","estado":"por-crear","precio":880,"icono":"monitor-up","descripcion":"Indicadores clave para dirección comercial.","detalle":"KPIs estratégicos en tiempo real para toma de decisión."},
          {"id":"automatizacion-whatsapp","nombre":"Automatización WhatsApp","estado":"por-crear","precio":730,"icono":"message-circle","descripcion":"Recordatorios y avisos operativos automáticos.","detalle":"Mensajería programada para eventos de campaña y cobro."},
          {"id":"fidelizacion-clientes","nombre":"Fidelización de clientes","estado":"por-crear","precio":520,"icono":"heart","descripcion":"Reglas de recurrencia y recompensas.","detalle":"Módulo para sostener recompra y lealtad."},
          {"id":"bundle-promociones","nombre":"Bundles y promociones","estado":"por-crear","precio":560,"icono":"boxes","descripcion":"Promociones por combo y reglas condicionales.","detalle":"Definición de combos y bonificaciones por volumen."},
          {"id":"control-stock-zona","nombre":"Control de stock por zona","estado":"por-crear","precio":690,"icono":"warehouse","descripcion":"Disponibilidad y rotación por territorio.","detalle":"Monitoreo de stock con alertas por quiebre."},
          {"id":"centro-ayuda","nombre":"Centro de ayuda interno","estado":"por-crear","precio":340,"icono":"life-buoy","descripcion":"Base de conocimiento para el equipo.","detalle":"Guías, tutoriales y respuestas operativas frecuentes."},
          {"id":"integracion-bi","nombre":"Integración BI externa","estado":"por-crear","precio":970,"icono":"network","descripcion":"Conexión de datos a herramientas de analítica.","detalle":"Exposición de datos para análisis avanzado y tableros externos."}
        ]
      };

      document.getElementById('titulo').textContent = data.meta.titulo;
      document.getElementById('subtitulo').textContent = data.meta.subtitulo;
      document.getElementById('nota').textContent = data.meta.notaPrecios;

      const modulosActivos = data.modulos.filter((modulo) => modulo.estado === 'activo');
      const modulosPorCrear = data.modulos.filter((modulo) => modulo.estado === 'por-crear');

      document.getElementById('total-activos').textContent = `${modulosActivos.length} activos`;
      document.getElementById('total-crear').textContent = `${modulosPorCrear.length} por crear`;

      document.getElementById('grid-activos').innerHTML = modulosActivos.map((modulo) => renderModulo(modulo, data.meta.moneda)).join('');
      document.getElementById('grid-crear').innerHTML = modulosPorCrear.map((modulo) => renderModulo(modulo, data.meta.moneda)).join('');

      lucide.createIcons();

      document.querySelectorAll('[data-modulo-check]').forEach((checkbox) => {
        checkbox.addEventListener('change', () => actualizarPedido(data));
      });
      actualizarPedido(data);

      const modal = document.getElementById('modal');
      const modalTitulo = document.getElementById('modal-titulo');
      const modalDescripcion = document.getElementById('modal-descripcion');
      const cerrar = document.getElementById('cerrar-modal');

      document.querySelectorAll('[data-open-modal]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const modulo = data.modulos.find((item) => item.id === btn.dataset.openModal);
          if (!modulo) return;

          modalTitulo.textContent = modulo.nombre;
          modalDescripcion.textContent = modulo.detalle;
          modal.classList.remove('hidden');
          modal.classList.add('flex');
        });
      });

      const cerrarModal = () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      };

      cerrar.addEventListener('click', cerrarModal);
      modal.addEventListener('click', (event) => {
        if (event.target === modal) cerrarModal();
      });
      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') cerrarModal();
      });
    }

    iniciar();
  </script>
</body>
</html>
