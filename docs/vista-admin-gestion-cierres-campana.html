<!doctype html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vista Admin gestión de cierres de campaña</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-50 text-zinc-900"><main class="mx-auto max-w-7xl px-4 py-8 space-y-6">
<header class="rounded-2xl border border-zinc-200 bg-white p-6"><h1 class="text-3xl font-bold">Vista Admin con gestión de cierres de campaña</h1><p class="mt-2 text-sm text-zinc-600">Control operativo de fechas límite, validación y bloqueo de campañas.</p></header>
<section class="grid gap-6 lg:grid-cols-3"><form class="rounded-2xl border border-zinc-200 bg-white p-5 space-y-3"><h2 class="text-lg font-semibold">Crear cierre</h2><input class="w-full rounded-md border border-zinc-300 px-3 py-2" placeholder="Catálogo N°"><input type="date" class="w-full rounded-md border border-zinc-300 px-3 py-2"><select class="w-full rounded-md border border-zinc-300 px-3 py-2"><option>Estado inicial: Abierto</option></select><button type="button" class="rounded-md bg-orange-600 px-3 py-2 text-sm font-semibold text-white">Registrar cierre</button></form>
<article class="rounded-2xl border border-zinc-200 bg-white p-5 lg:col-span-2"><h2 class="text-lg font-semibold">Cronograma de cierres</h2><table class="mt-3 w-full text-sm"><thead class="bg-zinc-50 text-left text-xs uppercase text-zinc-500"><tr><th class="px-3 py-2">Campaña</th><th class="px-3 py-2">Fecha</th><th class="px-3 py-2">Responsable</th><th class="px-3 py-2">Acción</th></tr></thead><tbody class="divide-y divide-zinc-100"><tr><td class="px-3 py-2">2/3</td><td class="px-3 py-2">30/05/2026</td><td class="px-3 py-2">Admin Central</td><td class="px-3 py-2"><button class="rounded bg-zinc-900 px-2 py-1 text-xs text-white">Cerrar</button></td></tr><tr><td class="px-3 py-2">3/3</td><td class="px-3 py-2">20/06/2026</td><td class="px-3 py-2">Admin Norte</td><td class="px-3 py-2"><button class="rounded bg-zinc-200 px-2 py-1 text-xs">Editar</button></td></tr></tbody></table></article></section>
</main></body></html>
