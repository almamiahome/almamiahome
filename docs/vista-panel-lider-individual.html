<!doctype html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vista Panel Líder individual</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-50 text-zinc-900"><main class="mx-auto max-w-6xl space-y-6 px-4 py-8">
<header class="rounded-2xl border border-zinc-200 bg-white p-6"><h1 class="text-3xl font-bold">Vista Panel Líder individual</h1><p class="text-sm text-zinc-600 mt-2">Detalle de desempeño por cierre para una líder específica.</p></header>
<section class="grid gap-4 md:grid-cols-3"><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Líder</p><p class="text-xl font-semibold">María Rodríguez</p></article><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Equipo activo</p><p class="text-xl font-semibold">37 revendedoras</p></article><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Premio acumulado</p><p class="text-xl font-semibold text-emerald-600">$132.000</p></article></section>
<section class="grid gap-6 lg:grid-cols-2"><form class="rounded-2xl border border-zinc-200 bg-white p-5 space-y-3"><h2 class="text-lg font-semibold">Ajustes y seguimiento</h2><label class="block text-sm">Estado<select class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2"><option>Activa</option><option>En observación</option></select></label><label class="block text-sm">Objetivo mensual<input class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2" value="40 revendedoras activas"></label><button type="button" class="rounded-md bg-orange-600 px-3 py-2 text-sm font-semibold text-white">Guardar</button></form>
<article class="rounded-2xl border border-zinc-200 bg-white p-5"><h2 class="text-lg font-semibold">Cierres recientes</h2><ul class="mt-3 space-y-2 text-sm"><li class="rounded-md bg-zinc-50 p-3 flex justify-between"><span>Cierre 1/3</span><strong>+ $42.000</strong></li><li class="rounded-md bg-zinc-50 p-3 flex justify-between"><span>Cierre 2/3</span><strong>+ $38.000</strong></li><li class="rounded-md bg-zinc-50 p-3 flex justify-between"><span>Cierre 3/3</span><strong>+ $52.000</strong></li></ul></article></section>
</main></body></html>
