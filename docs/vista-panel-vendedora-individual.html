<!doctype html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vista Panel Vendedora individual</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-50 text-zinc-900"><main class="mx-auto max-w-6xl px-4 py-8 space-y-6">
<header class="rounded-2xl border border-zinc-200 bg-white p-6"><h1 class="text-3xl font-bold">Vista Panel Vendedora individual</h1><p class="mt-2 text-sm text-zinc-600">Ficha detallada de una vendedora con historial de actividad en V2.</p></header>
<section class="grid gap-4 md:grid-cols-3"><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Vendedora</p><p class="text-xl font-semibold">Ana López</p></article><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Líder asignada</p><p class="text-xl font-semibold">María R.</p></article><article class="rounded-xl border border-zinc-200 bg-white p-4"><p class="text-xs text-zinc-500">Estado</p><p class="text-xl font-semibold text-emerald-700">Activa</p></article></section>
<section class="rounded-2xl border border-zinc-200 bg-white p-5"><h2 class="text-lg font-semibold">Historial por campaña</h2><div class="mt-3 overflow-x-auto rounded-lg border border-zinc-200"><table class="min-w-full text-sm"><thead class="bg-zinc-50 text-left text-xs uppercase text-zinc-500"><tr><th class="px-3 py-2">Campaña</th><th class="px-3 py-2">Pedidos</th><th class="px-3 py-2">Unidades</th><th class="px-3 py-2">Puntos</th><th class="px-3 py-2">Pago</th></tr></thead><tbody class="divide-y divide-zinc-100"><tr><td class="px-3 py-2">1/3</td><td class="px-3 py-2">2</td><td class="px-3 py-2">14</td><td class="px-3 py-2">140</td><td class="px-3 py-2">Al día</td></tr><tr><td class="px-3 py-2">2/3</td><td class="px-3 py-2">3</td><td class="px-3 py-2">20</td><td class="px-3 py-2">250</td><td class="px-3 py-2">Pendiente</td></tr></tbody></table></div></section>
</main></body></html>
