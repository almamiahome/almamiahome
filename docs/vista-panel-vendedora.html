<!doctype html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vista Panel Vendedora</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-50 text-zinc-900"><main class="mx-auto max-w-7xl px-4 py-8 space-y-6">
<header class="rounded-2xl border border-zinc-200 bg-white p-6"><h1 class="text-3xl font-bold">Vista Panel Vendedora</h1><p class="mt-2 text-sm text-zinc-600">Resumen general para vendedoras con pedidos, puntos y premios.</p></header>
<section class="grid gap-4 md:grid-cols-4"><article class="rounded-xl border bg-white p-4 border-zinc-200"><p class="text-xs text-zinc-500">Pedidos del ciclo</p><p class="text-2xl font-semibold">3</p></article><article class="rounded-xl border bg-white p-4 border-zinc-200"><p class="text-xs text-zinc-500">Puntos actuales</p><p class="text-2xl font-semibold">1.480</p></article><article class="rounded-xl border bg-white p-4 border-zinc-200"><p class="text-xs text-zinc-500">Deuda vigente</p><p class="text-2xl font-semibold">$72.000</p></article><article class="rounded-xl border bg-white p-4 border-zinc-200"><p class="text-xs text-zinc-500">Meta continuidad</p><p class="text-2xl font-semibold text-emerald-600">67%</p></article></section>
<section class="grid gap-6 lg:grid-cols-2"><article class="rounded-2xl border border-zinc-200 bg-white p-5"><h2 class="text-lg font-semibold">Últimos pedidos</h2><table class="mt-3 w-full text-sm"><tbody class="divide-y divide-zinc-200"><tr><td class="py-2">Pedido #P-1281</td><td class="py-2">$31.200</td><td class="py-2 text-right text-emerald-700">Entregado</td></tr><tr><td class="py-2">Pedido #P-1325</td><td class="py-2">$27.500</td><td class="py-2 text-right text-sky-700">En reparto</td></tr></tbody></table></article>
<form class="rounded-2xl border border-zinc-200 bg-white p-5 space-y-3"><h2 class="text-lg font-semibold">Cargar comprobante</h2><input class="w-full rounded-md border border-zinc-300 px-3 py-2" placeholder="N° operación"><input type="file" class="w-full rounded-md border border-zinc-300 px-3 py-2"><button type="button" class="rounded-md bg-orange-600 px-3 py-2 text-sm font-semibold text-white">Enviar</button></form></section>
</main></body></html>
